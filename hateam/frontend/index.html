<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaTeam - Match Your Perfect Teammates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container" id="auth-section">
        <h1>Ha<span>Team</span></h1>
        <p class="subtitle">ระบบจับคู่เพื่อนทำโปรเจกต์ที่ดีที่สุด</p>

        <form id="auth-form">
            <div class="input-group" id="name-field" style="display: none;">
                <label for="name">ชื่อเรียกของคุณ (Display Name)</label>
                <input type="text" id="name" placeholder="ใส่ชื่อให้เพื่อนเรียกง่ายๆ">
            </div>

            <div class="input-group">
                <label for="email">อีเมลมหาวิทยาลัย</label>
                <input type="email" id="email" placeholder="example@swu.ac.th" required>
            </div>

            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-main" id="submit-btn">เข้าสู่ระบบ</button>
        </form>

        <p class="toggle-text" id="toggle-mode">
            ยังไม่มีบัญชีใช่ไหม? <span>สมัครสมาชิกที่นี่</span>
        </p>
    </div>


    <div class="dashboard-container" id="dashboard-section" style="display: none;">
        
        <nav class="navbar">
            <h2>Ha<span>Team</span></h2>
            <button id="logout-btn" class="btn-outline">ออกจากระบบ</button>
        </nav>

        <div class="dashboard-content">
            <div class="header-action">
                <h3>กระดานหาเพื่อนทำโปรเจกต์</h3>
                <button id="show-create-btn" class="btn-main" style="width: auto; padding: 10px 20px;">+ สร้างโปรเจกต์ใหม่</button>
            </div>

            <div class="project-grid" id="project-list">
                </div>
        </div>
        
    </div>


    <div id="create-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>✨ สร้างโปรเจกต์ใหม่</h3>
            <form id="create-project-form">
                
                <div class="input-group">
                    <label for="project-title">ชื่อโปรเจกต์</label>
                    <input type="text" id="project-title" placeholder="เช่น แอปหาเพื่อนทำโปรเจกต์จบ" required>
                </div>
                
                <div class="input-group">
                    <label for="project-desc">รายละเอียด</label>
                    <textarea id="project-desc" rows="4" placeholder="ต้องการเพื่อนร่วมทีมที่ถนัด Node.js..." required style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; font-family: inherit; box-sizing: border-box; resize: vertical;"></textarea>
                </div>
                
                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="btn-outline">ยกเลิก</button>
                    <button type="submit" class="btn-main">สร้างโปรเจกต์เลย!</button>
                </div>
                
            </form>
        </div>
    </div>

    <div id="edit-modal" class="modal" style="display: none;">
        <div class="modal-content" style="border-top: 8px solid #3498db;"> <h3>✏️ แก้ไขโปรเจกต์</h3>
            <form id="edit-project-form">
                
                <input type="hidden" id="edit-project-id"> 
                
                <div class="input-group">
                    <label for="edit-project-title">ชื่อโปรเจกต์</label>
                    <input type="text" id="edit-project-title" required>
                </div>
                
                <div class="input-group">
                    <label for="edit-project-desc">รายละเอียด</label>
                    <textarea id="edit-project-desc" rows="4" required style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; font-family: inherit; box-sizing: border-box; resize: vertical;"></textarea>
                </div>
                
                <div class="modal-actions">
                    <button type="button" id="cancel-edit-btn" class="btn-outline">ยกเลิก</button>
                    <button type="submit" class="btn-main" style="background-color: #3498db;">บันทึกการแก้ไข</button>
                </div>
                
            </form>
        </div>
    </div>

    <div id="applicants-modal" class="modal" style="display: none;">
        <div class="modal-content" style="border-top: 8px solid #9b59b6;"> <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">👥 ผู้ที่สนใจเข้าร่วมทีม</h3>
                <button onclick="closeApplicantsModal()" style="background: none; border: none; font-size: 20px; cursor: pointer;">❌</button>
            </div>
            
            <div id="applicants-list" style="max-height: 300px; overflow-y: auto;">
                <p style="text-align: center; color: #7f8c8d;">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
